<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Maison">
<title>Présences maison</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: #e5e5e3;
    --text: #1a1a18;
    --text-secondary: #6b6b68;
    --text-muted: #9e9e9b;
    --accent: #3b7cf4;
    --accent-light: #eef3fe;
    --green: #22a06b;
    --green-light: #e8f7f0;
    --red: #e2483d;
    --red-light: #fdecea;
    --radius: 14px;
    --radius-sm: 10px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 2rem;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.25rem 0.875rem;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.875rem; }
  .app-title { font-size: 17px; font-weight: 600; color: var(--text); }
  .today-badge {
    font-size: 12px; font-weight: 500;
    background: var(--accent-light); color: var(--accent);
    padding: 4px 10px; border-radius: 20px;
  }
  .week-nav { display: flex; align-items: center; gap: 12px; }
  .week-nav button {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); width: 36px; height: 36px;
    font-size: 18px; color: var(--text-secondary); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .week-nav button:active { background: var(--border); }
  .week-label { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; text-align: center; }
  .main { padding: 1rem 1rem 0; }
  .section-label {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 0 0.25rem; margin-bottom: 0.625rem;
  }
  .grid-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 1rem;
  }
  .grid-header {
    display: grid;
    grid-template-columns: 80px repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .grid-header .gh-empty { padding: 0.5rem; }
  .day-head {
    padding: 0.5rem 2px;
    text-align: center;
    border-left: 1px solid var(--border);
  }
  .day-head .dname { font-size: 10px; font-weight: 500; color: var(--text-muted); display: block; }
  .day-head .dnum {
    font-size: 14px; font-weight: 600; color: var(--text);
    width: 26px; height: 26px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }
  .day-head.today .dname { color: var(--accent); }
  .day-head.today .dnum { background: var(--accent); color: white; font-size: 13px; }
  .person-row {
    display: grid;
    grid-template-columns: 80px repeat(7, 1fr);
    border-top: 1px solid var(--border);
  }
  .person-row:first-child { border-top: none; }
  .person-label {
    display: flex; align-items: center; gap: 8px;
    padding: 0.625rem 0.75rem;
    border-right: 1px solid var(--border);
  }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0;
  }
  .pname { font-size: 13px; font-weight: 500; color: var(--text); }
  .cell {
    border-left: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    padding: 6px 2px;
  }
  .cell-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1.5px solid var(--green);
    background: var(--green-light);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: transform 0.1s;
    color: var(--green);
  }
  .cell-btn:active { transform: scale(0.88); }
  .cell-btn.absent {
    background: var(--red-light);
    border-color: var(--red);
    color: var(--red);
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
    display: flex; gap: 1rem;
  }
  .stat { flex: 1; }
  .stat-val { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-val span { font-size: 14px; font-weight: 400; color: var(--text-secondary); }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .divider { width: 1px; background: var(--border); }
  .add-guest-btn {
    width: 100%; padding: 0.875rem;
    background: var(--surface); border: 1.5px dashed var(--border);
    border-radius: var(--radius); cursor: pointer;
    font-size: 14px; color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-bottom: 1rem;
  }
  .add-guest-btn:active { background: var(--bg); }
  .guest-form {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1rem;
    margin-bottom: 1rem; display: none;
  }
  .guest-form p { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
  .guest-form input {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text);
    font-size: 15px; outline: none;
    margin-bottom: 10px;
  }
  .guest-form input:focus { border-color: var(--accent); }
  .form-btns { display: flex; gap: 8px; }
  .form-btns button {
    flex: 1; padding: 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: none; cursor: pointer;
    font-size: 14px; color: var(--text);
  }
  .form-btns button.ok {
    background: var(--accent); color: white; border-color: var(--accent);
    font-weight: 500;
  }
  .form-btns button:active { opacity: 0.8; }
  .legend {
    display: flex; gap: 1rem; padding: 0 0.25rem;
    margin-bottom: 1rem;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="app-title">🏠 Présences maison</span>
    <span class="today-badge" id="today-badge"></span>
  </div>
  <div class="week-nav">
    <button onclick="changeWeek(-1)" aria-label="Semaine précédente">‹</button>
    <span class="week-label" id="week-label"></span>
    <button onclick="changeWeek(1)" aria-label="Semaine suivante">›</button>
  </div>
</header>

<div class="main">
  <div class="summary-card" id="summary"></div>

  <p class="section-label">Cette semaine</p>
  <div class="grid-card" id="grid"></div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--green-light);border:1.5px solid var(--green)"></div>
      Présent
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--red-light);border:1.5px solid var(--red)"></div>
      Absent
    </div>
  </div>

  <button class="add-guest-btn" id="add-btn" onclick="showForm()">
    ＋ Ajouter un invité
  </button>
  <div class="guest-form" id="gform">
    <p>Prénom de l'invité</p>
    <input type="text" id="ginput" placeholder="Ex: Marie" maxlength="16"/>
    <div class="form-btns">
      <button onclick="cancelGuest()">Annuler</button>
      <button class="ok" onclick="addGuest()">Ajouter</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const MONTHS = ['jan','fév','mar','avr','mai','juin','juil','aoû','sep','oct','nov','déc'];
const FULL_MONTHS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const AVATARS = [
  {bg:'#dbeafe',color:'#1e40af'},
  {bg:'#dcfce7',color:'#166534'},
  {bg:'#fef9c3',color:'#854d0e'},
  {bg:'#f3e8ff',color:'#6b21a8'},
  {bg:'#fee2e2',color:'#991b1b'},
];

let weekOffset = 0;
const BASE_PEOPLE = [
  {id:1, name:'Mam', initials:'Ma', av:0},
  {id:2, name:'Matth', initials:'Mt', av:1},
  {id:3, name:'Alice', initials:'Al', av:2},
];
let guests = JSON.parse(localStorage.getItem('guests') || '[]');
let people = [...BASE_PEOPLE, ...guests];
let absences = JSON.parse(localStorage.getItem('absences') || '{}');

function save() {
  localStorage.setItem('absences', JSON.stringify(absences));
  localStorage.setItem('guests', JSON.stringify(guests));
}

function getMonday(offset) {
  const d = new Date();
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff + offset * 7);
  d.setHours(0,0,0,0);
  return d;
}

function dateKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function todayKey() { return dateKey(new Date()); }

function toggle(pid, dk) {
  const k = pid + '_' + dk;
  absences[k] = !absences[k];
  save();
  render();
}

function changeWeek(d) { weekOffset += d; render(); }

function showForm() {
  document.getElementById('gform').style.display = 'block';
  document.getElementById('add-btn').style.display = 'none';
  document.getElementById('ginput').focus();
}

function cancelGuest() {
  document.getElementById('gform').style.display = 'none';
  document.getElementById('add-btn').style.display = 'flex';
  document.getElementById('ginput').value = '';
}

function addGuest() {
  const name = document.getElementById('ginput').value.trim();
  if (!name) return;
  const id = 'g' + Date.now();
  const guest = {id, name, initials: name.slice(0,2).toUpperCase(), av: (BASE_PEOPLE.length + guests.length) % AVATARS.length};
  guests.push(guest);
  people = [...BASE_PEOPLE, ...guests];
  save();
  cancelGuest();
  render();
}

function removeGuest(id) {
  guests = guests.filter(g => g.id !== id);
  people = [...BASE_PEOPLE, ...guests];
  save();
  render();
}

function render() {
  const monday = getMonday(weekOffset);
  const days = Array.from({length:7}, (_,i) => {
    const d = new Date(monday); d.setDate(d.getDate()+i); return d;
  });
  const today = todayKey();

  // Badge today
  const now = new Date();
  document.getElementById('today-badge').textContent = now.getDate() + ' ' + FULL_MONTHS[now.getMonth()];

  // Week label
  const from = days[0].getDate() + ' ' + MONTHS[days[0].getMonth()];
  const to = days[6].getDate() + ' ' + MONTHS[days[6].getMonth()];
  document.getElementById('week-label').textContent = from + ' → ' + to;

  // Summary
  const todayAbsent = people.filter(p => absences[p.id+'_'+today]).length;
  const todayPresent = people.length - todayAbsent;
  const weekAbsences = days.reduce((s,d) => s + people.filter(p => absences[p.id+'_'+dateKey(d)]).length, 0);
  document.getElementById('summary').innerHTML = `
    <div class="stat">
      <div class="stat-val">${todayPresent}<span>/${people.length}</span></div>
      <div class="stat-label">Présents aujourd'hui</div>
    </div>
    <div class="divider"></div>
    <div class="stat">
      <div class="stat-val">${weekAbsences}</div>
      <div class="stat-label">Absences cette semaine</div>
    </div>
  `;

  // Grid header
  let html = '<div class="grid-header"><div class="gh-empty"></div>';
  days.forEach((d,i) => {
    const dk = dateKey(d);
    const isToday = dk === today;
    html += `<div class="day-head${isToday?' today':''}">
      <span class="dname">${DAYS[i]}</span>
      <span class="dnum">${d.getDate()}</span>
    </div>`;
  });
  html += '</div>';

  // Person rows
  people.forEach(p => {
    const av = AVATARS[p.av % AVATARS.length];
    const isGuest = String(p.id).startsWith('g');
    html += `<div class="person-row">
      <div class="person-label">
        <div class="avatar" style="background:${av.bg};color:${av.color}">${p.initials}</div>
        <span class="pname">${p.name}${isGuest ? ` <button onclick="removeGuest('${p.id}')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:11px;padding:0 2px" title="Supprimer">✕</button>` : ''}</span>
      </div>`;
    days.forEach(d => {
      const dk = dateKey(d);
      const absent = !!absences[p.id+'_'+dk];
      html += `<div class="cell">
        <button class="cell-btn${absent?' absent':''}" onclick="toggle(${JSON.stringify(p.id)},'${dk}')" aria-label="${p.name} ${dk}">
          ${absent ? '✕' : '✓'}
        </button>
      </div>`;
    });
    html += '</div>';
  });

  document.getElementById('grid').innerHTML = html;
}

render();
</script>
</body>
</html>
